name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild -scheme "perspective studio" \
            -destination "platform=macOS" \
            -skipPackagePluginValidation \
            build
